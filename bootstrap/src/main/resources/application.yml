spring:
  application:
    name: agenticrag

  servlet:
    multipart:
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:50MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:60MB}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Spring AI 框架默认配置（用于自动配置 OpenAiChatModel Bean）
  # 注意：此配置用于 Spring AI 框架自动配置，与 agenticrag.ai.providers.openai 配置相同
  ai:
    openai:
      base-url: ${BASE_URL}
      api-key: ${API_KEY}
      chat:
        options:
          model: deepseek-v4-flash
          stream-usage: false

agenticrag:
  parser:
    python:
      service-url: ${PYTHON_PARSER_SERVICE_URL:http://localhost:8000}
      timeout: ${PYTHON_PARSER_TIMEOUT:300000}
      fallback-enabled: ${PYTHON_PARSER_FALLBACK:true}
      health-check-interval: ${PYTHON_PARSER_HEALTH_CHECK_INTERVAL:30000}
    pdf:
      python:
        command: ${PDF_PYTHON_COMMAND:python}
        script: ${PDF_PYTHON_SCRIPT:scripts/pdf_pipeline/main.py}
        render-dpi: ${PDF_RENDER_DPI:216}
  auth:
    jwt:
      secret: ${JWT_SECRET:change-this-jwt-secret-to-a-long-random-value-1234567890}
      access-expire-seconds: ${JWT_ACCESS_EXPIRE_SECONDS:7200}
      refresh-expire-seconds: ${JWT_REFRESH_EXPIRE_SECONDS:604800}
  
  # 自定义 AI 配置（用于多提供商支持和用户自定义配置）
  # 注意：此配置用于应用级别的多提供商支持，与 spring.ai.openai 配置相同
  ai:
    default-provider: openai
    providers:
      openai:
        base-url: ${OPENAI_BASE_URL:${BASE_URL}}
        api-key: ${OPENAI_API_KEY:${API_KEY}}
        chat-model: ${OPENAI_CHAT_MODEL:deepseek-v4-flash}
        embedding-model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    
    # Embedding 专用配置（用于知识库向量化）
    embedding:
      provider: ${EMBEDDING_PROVIDER:qwen}
      base-url: ${EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      api-key: ${EMBEDDING_API_KEY:${API_KEY}}
      model: ${EMBEDDING_MODEL:text-embedding-v3}
    
    # 聊天场景配置
    chat:
      default-scene: general
      scenes:
        general:
          system-prompt: 你是一个智能聊天 AI 助手。
        rag_qa:
          temperature: 0.2
          system-prompt: 你是一个严格基于检索上下文回答问题的知识库助手。如果证据不足，要明确说明。
        summary:
          temperature: 0.3
          system-prompt: 你负责生成简洁、结构清晰的摘要。
        title_generation:
          temperature: 0.7
          max-tokens: 64
          system-prompt: 你负责为输入内容生成简洁明确的标题。
    rag:
      hybrid-enabled: true
      default-top-k: 5
      vector-top-k: 12
      keyword-top-k: 8
      similarity-threshold: 0.55
      vector-weight: 0.75
      keyword-weight: 0.25
      rewrite-enabled: true
      rerank-enabled: true
      max-context-chunks: 6
    observability:
      chars-per-token: 4.0
      cost:
        chat-input-per-1k-tokens: 0.002
        chat-output-per-1k-tokens: 0.008
        embedding-per-1k-tokens: 0.0001
      alerts:
        minimum-sample-size: 5
        consecutive-failures-threshold: 3
        retrieval-success-drop-threshold: 0.15
        model-error-rate-threshold: 0.20
        model-error-rate-increase-threshold: 0.10
        notifications-enabled: false
        webhook-url: ${RAG_ALERT_WEBHOOK_URL:}
        dispatch-interval-ms: 300000

server:
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
