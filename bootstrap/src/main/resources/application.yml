spring:
  application:
    name: agenticrag

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  ai:
    openai:
      base-url: ${BASE_URL}
      api-key: ${API_KEY}
      chat:
        options:
          model: deepseek-v4-flash
          stream-usage: false

agenticrag:
  auth:
    jwt:
      secret: ${JWT_SECRET:change-this-jwt-secret-to-a-long-random-value-1234567890}
      access-expire-seconds: ${JWT_ACCESS_EXPIRE_SECONDS:7200}
      refresh-expire-seconds: ${JWT_REFRESH_EXPIRE_SECONDS:604800}
  ai:
    chat:
      default-scene: general
      scenes:
        general:
          system-prompt: 你是一个准确、简洁的 AI 助手。
        rag_qa:
          temperature: 0.2
          system-prompt: 你是一个严格基于检索上下文回答问题的知识库助手。如果证据不足，要明确说明。
        summary:
          temperature: 0.3
          system-prompt: 你负责生成简洁、结构清晰的摘要。
        title_generation:
          temperature: 0.7
          max-tokens: 64
          system-prompt: 你负责为输入内容生成简洁明确的标题。

server:
  servlet:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
